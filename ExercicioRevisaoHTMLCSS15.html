<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 15 - HTML CSS</title>
    <style>
        .navigation{
            display: flex;
            flex-flow: row wrap;
            justify-content: flex-end;
            list-style: none;
            margin: 0;
            background-color: black;

        }

        .navigation a{
            text-decoration: none;
            display: block;
            padding: 1rem;
            color: gold;
        }

        .navigation a:hover{
            background-color: gold;
            color: black;
            font-weight: 800;
        }

        @media all and (max-width:800px){
            .navigation{
                justify-content: space-around;
            }
        }

        @media all and (max-width:600px){
            .navigation{
                flex-flow: column-reverse;
                padding: 0;
            }
            .navigation a{
                text-align: center;
                padding: 10px;
                border-top: solid gold;
                border-bottom: solid rgb(134, 97, 3) 1px;
            }
            .navigation li:last-of-type a{
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <ul class="navigation">
        <li><a href="http://">Início</a></li>
        <li><a href="http://">Produtos</a></li>
        <li><a href="http://">Contato</a></li>
        <li><a href="http://">Sobre</a></li>
    </ul>
    <h1>Exemplo 15 HTML CSS - Flexbox responsivo</h1>
</body>
</html>
